- name: oel 7.5 text_processing build
  remote_user: ulsprovision
  hosts: textprocessors
  become: yes

  tasks:

  - name: install poppler-utils for pdftotext
    yum:
      name:
        - poppler-utils
      state: latest

  - name: install pandoc
    yum:
      name:
        - pandoc
      state: latest

  - name: Ensure pandoc is installed on RHEL 10
    ansible.builtin.dnf:
      name: pandoc
      state: present

  - name: Create catdoc wrapper script for OJS
    ansible.builtin.copy:
      dest: /usr/bin/catdoc
      owner: root
      group: root
      mode: '0755'
      content: |
        #!/bin/bash
        # OJS passes the file path as the final argument ($1 or %s)
        # Pandoc converts the doc/docx file to plain text on stdout
          
        if [ -z "$1" ]; then
            exit 0
        fi

        exec /usr/bin/pandoc "$1" -t plain

  - name: install ghostscript for ps2ascii
    yum:
      name:
        - ghostscript
      state: latest

  - name: Add catdox.sh
    copy:
      src: resources/textprocessing/catdox.sh
      dest: /usr/local/bin/catdox.sh
      mode: u=rwx,g=rx,o=rx
      owner: root
      group: root

  - name: Add docx2txt.pl
    copy:
      src: resources/textprocessing/docx2txt.pl
      dest: /usr/local/bin/docx2txt.pl
      mode: u=rwx,g=rx,o=rx
      owner: root
      group: root

  - name: install html2text
    yum:
      name:
        - python3-html2text
      state: latest
